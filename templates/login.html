<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .layout{
            display: flex;
            gap: 40px;
            padding: 20px;
        }
        .search{
            width: 45%;
        }
        .results{
            width: 55%;
        }
        .login{
            display:inline;
            gap: 40px;
            padding: 20px;
            border: 1px solid #000000;
        }
        .login-container{
            display:inline;
        }
        .signup{
            display:inline;
            gap: 40px;
            padding: 20px;
            border: 1px solid #000000;
        }
        .signup-container{
            display:inline;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table{
            border: 1px solid #fff;
        }
    </style>
</head>
<body>
    <h1>Welcome to Group 6 Music Library Database Login / Signup Page</h1>

    <div class="layout">
        
        <div class="login">
            <h3>Have an account? Log in here!</h3>
            <h3>Log into Your Account</h3>
            <div class="login-container">
                <form action="/login-process" method="POST">
                    <div class="text">
                        <label for="username">Username:</label>
                    </div>
                    <div class="username">
                        <input type="username" name="login-username" placeholder="Your Username" required>
                    </div>

                    <div class="text">
                        <label for="password">Password:</label>
                    </div>
                    <div class="password">
                        <input type="password" name="login-password" placeholder="YourPassword" required>
                    </div>

                    <button type="submit">Login</button>
                </form>


            </div>
        </div>

        <div class="signup">
            <h3>Don't have an account? Sign up here!</h3>
            <div class="signup-container">
                <h3>Sign Up</h3>

                <form action="/signup-process" method="POST">
                    <div class="text">
                        <label for="username">Username:</label>
                    </div>
                    <div class="username">
                        <input type="username" name="signup-username" placeholder="Your Username" required>
                    </div>
                    <div class="text">
                        <label for="firstname">FirstName:</label>
                    </div>
                    <div class="firstname">
                        <input type="text" name="signup-firstname" placeholder="Your First Name" required>
                    </div>
                    <div class="text">
                        <label for="lastname">Last Name:</label>
                    </div>
                    <div class="lastname">
                        <input type="text" name="signup-lastname" placeholder="Your Last Name" required>
                    </div>
                    <div class="text">
                        <label for="email">Email:</label>
                    </div>
                    <div class="email">
                        <input type="email" name="signup-email" placeholder="Your Email" required>
                    </div>

                    <div class="text">
                        <label for="password">Password:</label>
                    </div>
                    <div class="password">
                        <input type="password" name="signup-password" placeholder="YourPassword" required>
                    </div>

                    <button type="submit">Sign Up</button>
                </form>
            </div>


        </div>

    </div>
</body>
</html>
